server.port=8080

# Database connection settings
spring.datasource.url=jdbc:mysql://mysql-db:3306/tdktestmanagerproddb?createDatabaseIfNotExist=true&autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
## Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
logging.level.root=INFO


spring.liquibase.change-log=classpath:db/changelogs/changelog-master.xml
spring.liquibase.enabled=false

# File size
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB

management.endpoints.web.exposure.include=health,info

management.endpoints.web.cors.allowed-origins=http://localhost:4200
management.endpoints.web.cors.allowed-methods=GET,POST,OPTIONS,HEAD 
# Include HEAD as well for health/info
management.endpoints.web.cors.allowed-headers=*
management.endpoints.web.cors.allow-credentials=true
management.endpoints.web.cors.max-age=3600

#jwt configs, replace with env variables in production
jwt.secret=843567893696976453275974432697R634976R7R9343RT340394I934RF23232T23Q23T
jwt.expirationTime=86400000


# Ensure no handler found exceptions are thrown
spring.mvc.throw-exception-if-no-handler-found=true
spring.devtools.add-properties=false


tdkservice.baseURL=http://localhost:8080/tdkservice

